<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Frozen Jr. | Tyler Robertson</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="icon" href="../images/websiteImages/PortfolioWebsiteIcon.png" type="image/png">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .production-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            font-family: 'Urbanist', sans-serif;
        }

        /* Credits Styling */
        .credits-section {
            display: flex;
            justify-content: space-between;
            background: #f9f9f9;
            padding: 30px;
            border-radius: 8px;
            margin-bottom: 40px;
        }

        .credits-list {
            list-style: none;
            padding: 0;
        }

        .credits-list li {
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .credits-list strong {
            font-weight: 700;
            text-transform: uppercase;
            color: #333;
            margin-right: 10px;
        }

        /* NEW Gallery Styles */
        .main-stage {
            width: 100%;
            height: 600px;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        #current-photo {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: opacity 0.3s ease;
        }

        .filmstrip {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0;
            scrollbar-width: thin;
        }

        .filmstrip img {
            width: 150px;
            height: 100px;
            object-fit: cover;
            cursor: pointer;
            border-radius: 4px;
            opacity: 0.5;
            transition: 0.3s;
        }

        .filmstrip img:hover, .filmstrip img.active {
            opacity: 1;
            box-shadow: 0 0 0 2px #333;
        }

        @media (max-width: 768px) {
            .credits-section { flex-direction: column; }
            .main-stage { height: 350px; }
        }
    </style>
</head>

<body>

<header>
    <nav class="left-header">
        <a href="../index.html">Home</a>
        <a href="../resume.html">Resume</a>
        <a href="../upnext.html">Up Next</a>
    </nav>
    <h1 class="title">Tyler Robertson</h1>
    <nav class="right-header">
        <a href="../about.html">About</a>
        <a href="../contact.html">Contact</a>
    </nav>
</header>

<section class="heading">
    <h2>Mean Girls Jr.</h2>
</section>

<main class="production-container">
    
    <section class="credits-section">
        <div>
            <h3>Production Credits</h3>
            <ul class="credits-list">
                <li><strong>Director:</strong> Christian Pullings</li>
                <li><strong>Stage Manager:</strong> Arin Anderson</li>
                <li><strong>Music Director:</strong> Tyler Robertson</li>
                <li><strong>Choreography:</strong> Claire Downes</li>
            </ul>
        </div>
        <div>
            <h3>Venue & Date</h3>
            <ul class="credits-list">
                <li><strong>Location:</strong> Muncie Civic Theatre</li>
                <li><strong>Date:</strong> February 2024</li>
            </ul>
        </div>
    </section>

    <section class="gallery-wrapper">
        <div class="main-stage">
            <img id="current-photo" src="../images/Portfolio Stuff/Mean Girls Jr/MeanGirlsTitlePictureActual.JPG" alt="Featured Photo">
        </div>

        <div class="filmstrip">
            <img src="../images/Portfolio Stuff/Mean Girls Jr/MeanGirlsTitlePictureActual.JPG" class="active" onclick="switchPhoto(this)">
            <img src="../images/Portfolio Stuff/Mean Girls Jr/DSC_9484.jpg" onclick="switchPhoto(this)">
            <img src="../images/Portfolio Stuff/Mean Girls Jr/DSC_9522.jpg" onclick="switchPhoto(this)">
            <img src="../images/Portfolio Stuff/Mean Girls Jr/DSC_9543.jpg" onclick="switchPhoto(this)">
            <img src="../images/Portfolio Stuff/Mean Girls Jr/DSC_9552.jpg" onclick="switchPhoto(this)">
            <img src="../images/Portfolio Stuff/Mean Girls Jr/DSC_9776.jpg" onclick="switchPhoto(this)">
            <img src="../images/Portfolio Stuff/Mean Girls Jr/DSC_9806.jpg" onclick="switchPhoto(this)">
            <img src="../images/Portfolio Stuff/Mean Girls Jr/DSC_9827.jpg" onclick="switchPhoto(this)">
            <img src="../images/Portfolio Stuff/Mean Girls Jr/MeanGirlsTitlePicture.jpg" onclick="switchPhoto(this)">
        </div>
    </section>

</main>

<script>
    function switchPhoto(element) {
        const stage = document.getElementById('current-photo');
        
        // Fade out
        stage.style.opacity = 0;
        
        setTimeout(() => {
            stage.src = element.src;
            // Fade back in
            stage.style.opacity = 1;
        }, 250);

        // Update active thumbnail
        const thumbs = document.querySelectorAll('.filmstrip img');
        thumbs.forEach(t => t.classList.remove('active'));
        element.classList.add('active');
    }
</script>

</body>
</html>
